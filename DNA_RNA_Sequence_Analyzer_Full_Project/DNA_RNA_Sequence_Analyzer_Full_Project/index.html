
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DNA & RNA Sequence Analyzer</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <header>
    <h1>DNA & RNA Sequence Analyzer System</h1>
    <p>Futuristic Bioinformatics Dashboard</p>
  </header>

  <main class="container">
    <div class="card">
      <h2>Sequence Input</h2>
      <textarea id="sequence" placeholder="Enter DNA/RNA sequence"></textarea>
      <button onclick="analyzeSequence()">Analyze Sequence</button>
    </div>

    <div class="card">
      <h2>Results</h2>
      <div id="results"></div>
    </div>

    <div class="card">
      <h2>Analytics</h2>
      <canvas id="dnaChart"></canvas>
    </div>
  </main>

  <script src="js/script.js"></script>
</body>
</html>
